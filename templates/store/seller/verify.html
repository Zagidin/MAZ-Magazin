{% extends 'store/base.html' %}
{% load static %}

{% block title %}Проверка QR - MZSH{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/pages/seller-verify.css' %}">
{% endblock %}

{% block content %}
<div class="verify-page">
    <div class="container">
        <h1 class="page-title">
            <i class="fas fa-qrcode"></i> Проверка выдачи заказа
        </h1>

        <div class="verify-form">
            <div class="form-group">
                <label for="orderQr"><i class="fas fa-user"></i> QR-код заказа</label>
                <input type="text" id="orderQr" class="form-control" placeholder="Отсканируйте QR клиента">
            </div>

            <div class="form-group">
                <label for="packageQr"><i class="fas fa-box"></i> QR-код пакета</label>
                <input type="text" id="packageQr" class="form-control" placeholder="Отсканируйте QR на пакете">
            </div>

            <button id="verifyOrderBtn" class="btn btn-primary btn-lg btn-block" type="button">
                <i class="fas fa-check"></i> Проверить
            </button>
        </div>

        <div id="verifyResult" class="verify-result" style="display: none;"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/pages/seller-verify.js' %}"></script>
{% endblock %}
